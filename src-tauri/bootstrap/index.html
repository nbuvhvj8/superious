<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outlier</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #ffffff;
        color: #0a2540;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: linear-gradient(135deg, #14532d 0%, #16a34a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -1px;
      }
      .label {
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #e5e7eb;
        border-top-color: #14532d;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="mark">o</div>
    <div class="row">
      <div class="spinner" aria-hidden="true"></div>
      <div class="label">Starting Outlier</div>
    </div>
  </body>
</html>
