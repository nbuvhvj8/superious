name: Desktop build (Tauri)

# Builds the Outlier desktop binaries on macOS, Windows, and Linux.
#
# - Runs on every PR that touches desktop-relevant paths so we catch breakage
#   before merging (the matrix is the only cross-platform validation we have
#   short of running the binary on each OS).
# - On manual dispatch the produced installers are uploaded as workflow
#   artifacts so contributors can grab a build for ad-hoc testing.
#
# This workflow does NOT sign the binaries — code signing requires Apple
# Developer + Windows EV certs that live as repository secrets, which are
# tracked separately. Unsigned builds are sufficient for CI smoke-testing.

on:
  pull_request:
    paths:
      - 'src-tauri/**'
      - 'scripts/prepare-sidecar.mjs'
      - 'next.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install npm deps
        run: npm ci

      - name: Build the Next.js app + sidecar
        run: npm run desktop:prebuild

      - name: Build Tauri bundle (unsigned)
        run: npx tauri build --target ${{ matrix.target }}
        env:
          # Tauri honors these for signing if present; we leave them empty so
          # the build produces an unsigned binary.
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      - name: Upload bundle artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: outlier-desktop-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: warn
          retention-days: 14
